<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SRT Builder</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🎬</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=upload" />
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --accent: #38bdf8;
      --accent-2: #f8fafc;
      --muted: #94a3b8;
      --success: #34d399;
      --danger: #f87171;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 20% 20%, rgba(56, 189, 248, 0.08), transparent 35%),
                  radial-gradient(circle at 80% 0%, rgba(52, 211, 153, 0.12), transparent 40%),
                  var(--bg);
      color: var(--accent-2);
      font-family: "Space Grotesk", system-ui, -apple-system, sans-serif;
      line-height: 1.5;
      overflow-x: hidden;
    }
    h1 { margin: 0 0 0.25rem; font-size: 1.75rem; }
    p { margin: 0.25rem 0 1rem; color: var(--muted); }
    .page { max-width: 1100px; margin: 0 auto; padding: 32px 20px 48px; }
    .card {
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 16px;
      padding: 16px 18px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(10px);
      overflow: hidden;
    }
    .stack { display: grid; gap: 14px; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    label { color: var(--muted); font-size: 0.9rem; }
    input[type="file"], button, textarea, select {
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
      color: var(--accent-2);
      padding: 8px 12px;
      font-family: inherit;
      font-size: 0.95rem;
    }
    input[type="file"] { display: none; }
    .upload-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
      color: var(--accent);
      cursor: pointer;
      transition: all 0.2s;
    }
    .upload-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--accent);
      transform: translateY(-2px);
    }
    .upload-btn .material-symbols-rounded {
      font-size: 24px;
    }
    button {
      background: linear-gradient(135deg, #38bdf8, #22c55e);
      color: #0b1021;
      font-weight: 700;
      letter-spacing: 0.01em;
      cursor: pointer;
      border: none;
      transition: transform 0.08s ease, box-shadow 0.15s ease, opacity 0.15s ease;
      box-shadow: 0 10px 30px rgba(34, 197, 94, 0.35);
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 14px 34px rgba(56, 189, 248, 0.35); }
    textarea { width: 100%; min-height: 160px; resize: vertical; }
    .lane { position: relative; border-radius: 10px; overflow: hidden; background: #0b1224; border: 1px solid rgba(255,255,255,0.06); width: 100%; min-width: 0; }
    #laneViewport { position: relative; width: 100%; min-width: 0; overflow: hidden; display: flex; flex-direction: column; }
    #subtitleTrack { height: 46px; border-bottom: 1px solid rgba(255,255,255,0.06); position: relative; overflow: visible; }
    #subtitleTrackInner { position: relative; height: 100%; overflow: visible; will-change: width; }
    .sub-block { position: absolute; top: 6px; height: 34px; border-radius: 4px; background: rgba(56, 189, 248, 0.2); border: 1px solid rgba(56, 189, 248, 0.6); color: #e2f3ff; font-size: 0.9rem; user-select: none; cursor: grab; box-sizing: border-box; display: flex; align-items: center; padding: 0; overflow: hidden; white-space: nowrap; min-width: 30px; }\n    .sub-block:active { cursor: grabbing; }\n    .sub-block:hover { background: rgba(56, 189, 248, 0.3); }\n    .sub-block-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; pointer-events: none; padding: 0 6px; min-width: 0; }\n    .sub-block-handle { cursor: ew-resize; pointer-events: auto; }\n    .sub-block-handle:hover { background: rgba(56, 189, 248, 0.8) !important; box-shadow: 0 0 4px rgba(56, 189, 248, 0.6); }\n    .sub-block-handle.left { border-radius: 4px 0 0 4px; }\n    .sub-block-handle.right { border-radius: 0 4px 4px 0; }
    #waveframe { position: relative; height: 150px; overflow: hidden; width: 100%; min-width: 0; }
    #waveform { position: absolute; inset: 0; height: 150px; overflow: hidden; }
    .scroll-controls { display: flex; align-items: center; gap: 10px; margin-top: 8px; color: var(--muted); }
    .scroll-controls input[type="range"] { flex: 1; }
    .meter { display: flex; align-items: center; gap: 10px; color: var(--muted); font-size: 0.9rem; }
    .pill { padding: 4px 10px; border-radius: 999px; background: rgba(255, 255, 255, 0.08); color: var(--accent-2); font-weight: 600; font-family: 'Courier Prime', monospace; font-variant-numeric: tabular-nums; font-size: 1.1rem; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 8px 6px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    th { text-align: left; color: var(--muted); font-size: 0.85rem; font-weight: 600; letter-spacing: 0.02em; }
    td { font-size: 0.95rem; font-variant-numeric: tabular-nums; }
    td:nth-child(1), td:nth-child(2), td:nth-child(3) { font-family: 'Courier Prime', monospace; min-width: 100px; }
    th:nth-child(1) { min-width: 60px; }
    th:nth-child(2), th:nth-child(3) { min-width: 100px; }
    tr:hover td { background: rgba(255,255,255,0.03); }
    .text-cell { max-width: 620px; }
    .status { color: var(--muted); font-size: 0.9rem; min-height: 18px; }
    .badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 10px; border-radius: 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); }
    .muted { color: var(--muted); }
    .flex-1 { flex: 1; }
    .toggle-switch {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      color: var(--muted);
    }
    .toggle-switch input[type="checkbox"] {
      display: none;
    }
    .toggle-switch label {
      display: flex;
      align-items: center;
      cursor: pointer;
      padding: 4px;
    }
    .toggle-slider {
      width: 36px;
      height: 20px;
      background: rgba(255,255,255,0.15);
      border-radius: 10px;
      position: relative;
      transition: background 0.3s;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      background: var(--accent-2);
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: left 0.3s;
    }
    .toggle-switch input[type="checkbox"]:checked + label .toggle-slider {
      background: var(--success);
    }
    .toggle-switch input[type="checkbox"]:checked + label .toggle-slider::before {
      left: 18px;
    }
    .right { margin-left: auto; display: flex; gap: 10px; align-items: center; }
    
    /* 自定義倍速選擇框樣式 */
    #rate {
      background: linear-gradient(135deg, #1e3a5f, #2d5a8c);
      color: #e0f2fe;
      border: 2px solid rgba(56, 189, 248, 0.4);
      padding: 8px 12px;
      border-radius: 8px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    #rate:hover {
      border-color: rgba(56, 189, 248, 0.8);
      background: linear-gradient(135deg, #1f4d78, #2d6ba8);
      box-shadow: 0 0 12px rgba(56, 189, 248, 0.3);
    }
    
    #rate:focus {
      outline: none;
      border-color: var(--accent);
      background: linear-gradient(135deg, #2561a0, #3578c5);
      box-shadow: 0 0 16px rgba(56, 189, 248, 0.5);
    }
    
    /* 選項樣式 */
    #rate option {
      background: #1e3a5f;
      color: #e0f2fe;
      padding: 8px;
    }
    
    @media (max-width: 768px) {
      .row { flex-direction: column; align-items: flex-start; }
      .right { margin-left: 0; width: 100%; justify-content: flex-start; }
      table { display: block; overflow-x: auto; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="stack">
      <div class="card">
        <h1>SRT Builder</h1>
        <p>載入影片或音訊，播放時按 <strong>T</strong> 將文字依序送到字幕軌，最後匯出 SRT。</p>
        <div class="row">
          <div style="display: flex; flex-direction: column; align-items: center; gap: 4px;">
            <label class="upload-btn" for="mediaInput" title="載入影片/音訊">
              <span class="material-symbols-rounded">upload</span>
            </label>
            <span style="font-size: 0.75rem; color: var(--muted);">影片/音訊</span>
          </div>
          <input id="mediaInput" type="file" accept="audio/*,video/*" />
          <div style="display: flex; flex-direction: column; align-items: center; gap: 4px;">
            <label class="upload-btn" for="textInput" title="載入 TXT">
              <span class="material-symbols-rounded">upload</span>
            </label>
            <span style="font-size: 0.75rem; color: var(--muted);">文字檔</span>
          </div>
          <input id="textInput" type="file" accept="text/plain" />
          <button id="exportBtn" disabled>匯出 SRT</button>
          <button id="undoBtn" disabled title="撤銷上一步 (Ctrl+Z)">↶ 撤銷</button>
          <span class="badge">按 T 插入當前台詞</span>
        </div>
        <div class="row">
          <div class="meter">
            <button id="playPause" disabled>開始</button>
            <button id="rewind" disabled>↺ 開頭</button>
            <button id="reverse" disabled>倒放</button>
            <span class="pill" id="timeLabel">00:00:00.00/00:00:00.00</span>
            <label for="zoom">縮放</label>
            <input id="zoom" type="range" min="1" max="400" value="1" />
            <button id="fitZoom" disabled>最佳適配</button>
            <label for="rate">倍速</label>
            <select id="rate">
              <option value="1">1.0x</option>
              <option value="1.25">1.25x</option>
              <option value="1.5">1.5x</option>
              <option value="2">2.0x</option>
              <option value="2.5">2.5x</option>
              <option value="3">3.0x</option>
            </select>
            <div class="toggle-switch">
              <input type="checkbox" id="autoCenterToggle" checked>
              <label for="autoCenterToggle" title="播放時自動將播放頭置中">
                <div class="toggle-slider"></div>
                <span> 播放頭置中</span>
              </label>
            </div>
          </div>
          <div class="right">
            <span class="muted" id="fileName">尚未載入媒體</span>
          </div>
        </div>
        <div class="lane" id="lane">
          <div id="laneViewport">
            <div id="subtitleTrack">
              <div id="subtitleTrackInner"></div>
            </div>
            <div id="waveframe">
              <div id="waveform"></div>
            </div>
          </div>
        </div>
        <div class="scroll-controls">
          <button id="scrollLeft" disabled>◀</button>
          <input id="scrollPos" type="range" min="0" max="100" value="0" />
          <button id="scrollRight" disabled>▶</button>
          <button id="resetSrt">重置字幕</button>
        </div>
        <div class="status" id="status"></div>
      </div>

      <div class="card">
        <div class="row" style="align-items: flex-start; gap: 14px;">
          <div class="flex-1">
            <label for="scriptBox">台詞文字（換行分段，空行表示與前後不連續）</label>
            <textarea id="scriptBox" placeholder="每行一段字幕，空行表示這裡有間隔。\n播放時按 T 即可把下一行送到 SRT。"></textarea>
          </div>
          <div class="row" style="align-items: flex-start; gap: 10px;">
            <button id="resetQueue">重建佇列</button>
          </div>
        </div>
      </div>

      <div class="card">
        <h3 style="margin: 0 0 10px;">SRT 時間軸</h3>
        <table>
          <thead>
            <tr><th>#</th><th>開始</th><th>結束</th><th class="text-cell">文字</th></tr>
          </thead>
          <tbody id="srtTable"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/wavesurfer.js@7"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
